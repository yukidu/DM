<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AI 智能海報設計師</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@latest/dist/bundle.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #f0f2f5; }
        .canvas-container { display: none; }
        canvas { max-width: 100%; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="py-10 px-4">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-3xl shadow-xl">
        <h1 class="text-3xl font-black text-center mb-8 tracking-tighter">AI 智能海報生成</h1>
        
        <div class="space-y-5">
            <input type="password" id="apiKey" class="w-full p-4 border rounded-2xl bg-gray-50" placeholder="貼上您的 Gemini API 金鑰">
            <input type="text" id="eventTitle" class="w-full p-4 border rounded-2xl" placeholder="活動名稱（如：未來科技論壇）">
            <input type="text" id="name" class="w-full p-4 border rounded-2xl" placeholder="主講人姓名">
            
            <div class="grid grid-cols-2 gap-4">
                <input type="date" id="date" class="p-4 border rounded-2xl bg-gray-50">
                <input type="time" id="time" class="p-4 border rounded-2xl bg-gray-50">
            </div>

            <div class="relative border-2 border-dashed border-gray-300 p-8 rounded-2xl text-center hover:bg-gray-50 transition">
                <input type="file" id="photoUpload" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                <p id="uploadStatus" class="text-gray-500 font-bold">點擊或拖放上傳主講人照片</p>
            </div>

            <button id="generateBtn" class="w-full py-5 bg-black text-white rounded-2xl font-black text-xl hover:scale-[1.02] active:scale-[0.98] transition shadow-lg">
                生成專屬海報
            </button>
            <p id="status" class="text-center text-sm font-bold text-blue-600"></p>
        </div>
    </div>

    <!-- 隱藏的結果區 -->
    <div id="resultArea" class="max-w-6xl mx-auto mt-12 grid md:grid-cols-2 gap-10 canvas-container">
        <div class="flex flex-col items-center">
            <span class="mb-4 font-black bg-black text-white px-4 py-1 rounded-full">直式宣傳版</span>
            <canvas id="portraitCanvas" width="1080" height="1920" class="w-[300px]"></canvas>
            <button onclick="download('portraitCanvas')" class="mt-4 text-gray-400 underline">下載直式圖</button>
        </div>
        <div class="flex flex-col items-center">
            <span class="mb-4 font-black bg-black text-white px-4 py-1 rounded-full">橫式活動版</span>
            <canvas id="landscapeCanvas" width="1920" height="1080" class="w-[500px]"></canvas>
            <button onclick="download('landscapeCanvas')" class="mt-4 text-gray-400 underline">下載橫式圖</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
