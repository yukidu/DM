<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 2.5 AI 海報設計師</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; }
        .poster-container svg { width: 100%; height: auto; border-radius: 0.5rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-3xl mx-auto bg-white p-8 rounded-3xl shadow-lg">
        <h1 class="text-3xl font-black text-center mb-8 text-slate-800">AI 視覺海報設計師</h1>
        
        <div class="grid grid-cols-1 gap-6">
            <!-- API 設定 -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Gemini API 金鑰</label>
                <input type="password" id="apiKey" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="輸入 API 金鑰">
            </div>

            <!-- 資料輸入 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="eventTitle" class="p-3 border rounded-xl" placeholder="活動名稱">
                <input type="text" id="speakerName" class="p-3 border rounded-xl" placeholder="主講人姓名">
                <input type="date" id="eventDate" class="p-3 border rounded-xl">
                <input type="time" id="eventTime" class="p-3 border rounded-xl">
            </div>

            <!-- 照片上傳 -->
            <div class="border-2 border-dashed border-gray-200 rounded-2xl p-6 text-center">
                <input type="file" id="photoUpload" accept="image/*" class="hidden">
                <label for="photoUpload" class="cursor-pointer">
                    <div id="uploadStatus" class="text-blue-600 font-bold">📷 點擊上傳主講人照片</div>
                    <div class="w-full bg-gray-100 rounded-full h-2 mt-4 hidden" id="progressParent">
                        <div id="progressBar" class="bg-blue-600 h-2 rounded-full w-0 transition-all"></div>
                    </div>
                </label>
            </div>

            <!-- 狀態顯示 -->
            <div id="apiFeedback" class="hidden p-4 rounded-xl text-sm font-mono"></div>

            <!-- 生成按鈕 -->
            <button id="generateBtn" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-xl hover:bg-black transition-all flex justify-center items-center">
                <span id="btnText">啟動 AI 智能設計</span>
                <div id="loader" class="hidden ml-3 w-6 h-6 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
            </button>
        </div>
    </div>

    <!-- 生成結果區 -->
    <div id="resultArea" class="hidden max-w-6xl mx-auto mt-12 grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="poster-container flex flex-col items-center">
            <h3 class="mb-4 font-bold text-gray-500">直式海報 (9:16)</h3>
            <div id="portraitOutput" class="w-full bg-white rounded-lg"></div>
        </div>
        <div class="poster-container flex flex-col items-center">
            <h3 class="mb-4 font-bold text-gray-500">橫式海報 (16:9)</h3>
            <div id="landscapeOutput" class="w-full bg-white rounded-lg"></div>
        </div>
    </div>

    <script>
        let base64Photo = "";

        // 處理照片上傳與進度顯示
        document.getElementById('photoUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const progressParent = document.getElementById('progressParent');
            const progressBar = document.getElementById('progressBar');
            const uploadStatus = document.getElementById('uploadStatus');

            progressParent.classList.remove('hidden');
            uploadStatus.innerText = "正在讀取照片...";

            const reader = new FileReader();
            reader.onprogress = (event) => {
                if (event.lengthComputable) {
                    const progress = (event.loaded / event.total) * 100;
                    progressBar.style.width = progress + "%";
                }
            };

            reader.onload = (event) => {
                base64Photo = event.target.result.split(',')[1];
                progressBar.style.width = "100%";
                uploadStatus.innerText = "✅ 照片上傳完成";
            };
            reader.readAsDataURL(file);
        });

        // 串接 Gemini API
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const apiKey = document.getElementById('apiKey').value;
            const title = document.getElementById('eventTitle').value;
            const name = document.getElementById('speakerName').value;
            const date = document.getElementById('eventDate').value;
            const time = document.getElementById('eventTime').value;
            
            const feedback = document.getElementById('apiFeedback');
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btnText');

            if (!apiKey || !title || !name || !base64Photo) {
                alert("請填寫所有欄位並上傳照片");
                return;
            }

            // 初始化狀態
            feedback.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'bg-green-50', 'text-green-700');
            feedback.classList.add('bg-blue-50', 'text-blue-700');
            feedback.innerText = "正在連線至 Gemini 2.5 API...";
            loader.classList.remove('hidden');
            btnText.innerText = "AI 設計中...";

            // 準備 Prompt
            // 我們要求 AI 產生兩組 SVG，並將照片放置於指定的佔位符
            const prompt = `你是一位專業的平面設計師。請根據提供的資料與照片，設計兩款「繁體中文」宣傳海報。
            資料：
            - 活動名稱：${title}
            - 主講人：${name}
            - 日期：${date}
            - 時間：${time}

            任務：
            1. 產生一組「直式 (9:16)」海報的 SVG 程式碼。
            2. 產生一組「橫式 (16:9)」海報的 SVG 程式碼。
            3. 風格要隨機但具備世界知名藝術美感（如：包浩斯、極簡主義或梵谷色彩）。
            4. 必須自動分析照片色調，設計協調的背景。
            5. 在 SVG 中，請使用 <image> 標籤並將 xlink:href 設定為 "SPEAKER_IMAGE_PLACEHOLDER"。
            6. 請確保所有文字皆為繁體中文。
            7. 僅回傳 JSON 格式，包含兩個欄位： "portrait_svg" 與 "landscape_svg"。`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [
                            {
                                parts: [
                                    { text: prompt },
                                    { inline_data: { mime_type: "image/jpeg", data: base64Photo } }
                                ]
                            }
                        ],
                        generationConfig: { response_mime_type: "application/json" }
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(`API 錯誤代碼: ${response.status} - ${errorData.error.message}`);
                }

                const data = await response.json();
                const resultText = data.candidates[0].content.parts[0].text;
                const posterData = JSON.parse(resultText);

                // 將照片嵌入 SVG
                const finalPortrait = posterData.portrait_svg.replace("SPEAKER_IMAGE_PLACEHOLDER", `data:image/jpeg;base64,${base64Photo}`);
                const finalLandscape = posterData.landscape_svg.replace("SPEAKER_IMAGE_PLACEHOLDER", `data:image/jpeg;base64,${base64Photo}`);

                // 顯示結果
                document.getElementById('portraitOutput').innerHTML = finalPortrait;
                document.getElementById('landscapeOutput').innerHTML = finalLandscape;
                document.getElementById('resultArea').classList.remove('hidden');

                feedback.className = "p-4 rounded-xl text-sm font-mono bg-green-50 text-green-700";
                feedback.innerText = "✅ 連線成功：AI 已完成海報設計。";

            } catch (error) {
                feedback.className = "p-4 rounded-xl text-sm font-mono bg-red-50 text-red-700";
                feedback.innerText = `❌ 執行失敗：${error.message}`;
                console.error(error);
            } finally {
                loader.classList.add('hidden');
                btnText.innerText = "啟動 AI 智能設計";
            }
        });
    </script>
</body>
</html>
