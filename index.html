<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安麗對焦系統 - 皇冠大使專用</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #f4f7f6; }
        .gradient-bg { background: linear-gradient(135deg, #1a365d 0%, #2d3748 100%); }
        .card { background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .input-field { border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; width: 100%; margin-top: 5px; }
        .btn-primary { background: #c05621; color: white; padding: 12px 24px; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .btn-primary:hover { background: #9c4221; transform: translateY(-2px); }
        #output { white-space: pre-wrap; line-height: 1.8; }
        .ai-message { border-left: 4px solid #c05621; padding-left: 1rem; background: #fffaf0; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="gradient-bg text-white p-8 rounded-t-2xl text-center">
            <h1 class="text-3xl font-bold mb-2">💎 安麗對焦決策系統</h1>
            <p class="text-gray-300">帶領萬人翻身、創造數億資產的領導者對焦邏輯</p>
        </div>

        <div class="card p-6 md:p-10 -mt-4">
            <!-- API Key Section -->
            <div class="mb-8">
                <label class="block text-sm font-bold text-gray-700">Google Gemini API Key:</label>
                <input type="password" id="apiKey" class="input-field" placeholder="在此貼上您的 API Key...">
                <p class="text-xs text-gray-400 mt-1">* 您的 Key 只會用於瀏覽器請求，不會被儲存。</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Inputs -->
                <div>
                    <label class="block text-sm font-bold text-gray-700">對象姓名</label>
                    <input type="text" id="name" class="input-field" placeholder="例如：王小明">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">年齡</label>
                    <input type="text" id="age" class="input-field" placeholder="例如：28">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">職業</label>
                    <input type="text" id="job" class="input-field" placeholder="例如：軟體工程師">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">是否已破題安麗？</label>
                    <select id="isRevealed" class="input-field">
                        <option value="尚未破題">尚未破題</option>
                        <option value="已知道我在做安麗，不排斥">已知道，不排斥</option>
                        <option value="已知道，有些防備">已知道，有些防備</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">是否參加過活動？</label>
                    <select id="hasAttended" class="input-field">
                        <option value="從未參加">從未參加</option>
                        <option value="參加過家庭聚會">參加過家庭聚會</option>
                        <option value="參加過大型中心會議">參加過大型中心會議</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">是否見過上手領導人？</label>
                    <select id="metUpline" class="input-field">
                        <option value="否">否</option>
                        <option value="是">是</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-gray-700">我希望邀約他參加什麼活動？</label>
                    <input type="text" id="targetEvent" class="input-field" placeholder="例如：週四晚上的創業說明會、蛋白霜手作課">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-gray-700">我希望推薦他什麼產品？</label>
                    <input type="text" id="targetProduct" class="input-field" placeholder="例如：紐崔萊倍立健、eSpring 淨水器">
                </div>
            </div>

            <div class="mt-10 text-center">
                <button onclick="generateStrategy()" id="btnSubmit" class="btn-primary w-full md:w-auto px-12">
                    開始對焦：大師級邀約建議
                </button>
            </div>
        </div>

        <!-- Result Section -->
        <div id="resultArea" class="mt-8 hidden">
            <div class="card p-6 md:p-10">
                <h2 class="text-2xl font-bold text-gray-800 mb-4 flex items-center">
                    <span class="mr-2">💡</span> 皇冠大使的實戰逐字稿
                </h2>
                <hr class="mb-6">
                <div id="output" class="text-gray-700"></div>
            </div>
        </div>
    </div>

    <script>
        async function generateStrategy() {
            const apiKey = document.getElementById('apiKey').value;
            if (!apiKey) {
                alert('請輸入 Gemini API Key');
                return;
            }

            const btn = document.getElementById('btnSubmit');
            const resultArea = document.getElementById('resultArea');
            const output = document.getElementById('output');

            btn.disabled = true;
            btn.innerText = '正在思考致勝策略...';

            const data = {
                name: document.getElementById('name').value || '這位朋友',
                age: document.getElementById('age').value || '不詳',
                job: document.getElementById('job').value || '一般上班族',
                isRevealed: document.getElementById('isRevealed').value,
                hasAttended: document.getElementById('hasAttended').value,
                metUpline: document.getElementById('metUpline').value,
                targetEvent: document.getElementById('targetEvent').value || '最近的線下分享會',
                targetProduct: document.getElementById('targetProduct').value || '紐崔萊基礎營養'
            };

            const prompt = `
你是一位安麗事業的傳奇企業家（皇冠大使），帶領過數萬人團隊，擁有數億財富。你的專長是精準邀約、啟發夢想、展示專業，最後提供產品建議。

現在我要跟你對焦一個跟進對象，請針對以下條件提供建議：
- 姓名：${data.name}
- 年齡：${data.age}
- 職業：${data.job}
- 是否已破題安麗：${data.isRevealed}
- 是否參加過活動：${data.hasAttended}
- 是否見過上手領導人：${data.metUpline}
- 預計邀約活動：${data.targetEvent}
- 預計推薦產品：${data.targetProduct}

請以「皇冠大使」的口吻，撰寫一份實戰演練逐字稿（Q&A 形式），內容包含：
1. **破冰與啟發夢想**：如何從他的職業痛苦點或生活現狀切入，給予一個「非變不可」的夢想藍圖。
2. **正式邀約話術**：針對「${data.targetEvent}」的具體邀約文字。
3. **模擬各種反應處理**：
   - 情況 A：如果他問「是不是安麗？」或表現冷淡，該如何優雅回覆？
   - 情況 B：如果他爽快答應，如何做會前暖身？
4. **產品零售建議**：如何不著痕跡地帶入「${data.targetProduct}」的專業建議。

請用專業、充滿能量、有溫度的台灣繁體中文撰寫。`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const resData = await response.json();
                const text = resData.candidates[0].content.parts[0].text;
                
                resultArea.classList.remove('hidden');
                output.innerHTML = formatText(text);
                window.scrollTo({ top: resultArea.offsetTop - 20, behavior: 'smooth' });

            } catch (error) {
                alert('發生錯誤，請檢查 API Key 是否正確或網路連線。');
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.innerText = '開始對焦：大師級邀約建議';
            }
        }

        function formatText(text) {
            // 簡單的格式化處理
            return text
                .replace(/\n/g, '<br>')
                .replace(/\*\*(.*?)\*\*/g, '<strong class="text-orange-800">$1</strong>')
                .replace(/### (.*?)/g, '<h3 class="text-xl font-bold mt-4 mb-2 text-blue-900">$1</h3>');
        }
    </script>
</body>
</html>
