<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 視覺藝術海報生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@latest/dist/bundle.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f5f7fa; }
        .canvas-container { border-radius: 20px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.15); background: #ddd; }
        canvas { width: 100%; height: auto; display: block; }
        .progress-bar { transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100">
        <h1 class="text-3xl font-black text-center mb-6 tracking-tighter text-slate-800">AI 視覺藝術海報設計師</h1>
        
        <div class="space-y-5">
            <!-- 設定區 -->
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1 ml-2 uppercase tracking-widest">GEMINI API 金鑰</label>
                <input type="password" id="apiKey" class="w-full p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-blue-500" placeholder="請在此輸入您的 API 金鑰">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="eventTitle" class="w-full p-4 bg-slate-50 rounded-2xl border-none" placeholder="活動名稱">
                <input type="text" id="speakerName" class="w-full p-4 bg-slate-50 rounded-2xl border-none" placeholder="講者姓名">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <input type="date" id="eventDate" class="p-4 bg-slate-50 rounded-2xl border-none">
                <input type="time" id="eventTime" class="p-4 bg-slate-50 rounded-2xl border-none">
            </div>

            <!-- 照片上傳區 -->
            <label for="photoUpload" class="relative block border-2 border-dashed border-slate-200 rounded-3xl p-8 text-center hover:bg-slate-50 transition cursor-pointer group">
                <input type="file" id="photoUpload" accept="image/*" class="hidden">
                <div id="uploadUI">
                    <p id="uploadStatusText" class="text-blue-600 font-bold">📷 點擊上傳主講人照片</p>
                    <p class="text-[10px] text-slate-400 mt-1">AI 將自動進行高精度去背</p>
                </div>
                <!-- 進度條 -->
                <div id="progressArea" class="hidden mt-4">
                    <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden">
                        <div id="progressBar" class="progress-bar bg-blue-600 h-full w-0"></div>
                    </div>
                    <p id="progressPercent" class="text-[10px] text-slate-500 mt-2 font-bold italic">處理中: 0%</p>
                </div>
            </label>

            <!-- API 狀態顯示 -->
            <div id="apiStatusArea" class="hidden p-4 rounded-2xl text-xs font-bold border-l-4">
                <p id="apiStatusText"></p>
            </div>

            <!-- 唯一按鈕：隨機設計 -->
            <button id="mainBtn" class="w-full py-5 bg-slate-900 text-white rounded-3xl font-black text-xl hover:bg-black active:scale-95 transition-all shadow-xl shadow-slate-200 flex justify-center items-center">
                <span id="btnText">隨機生成藝術海報</span>
                <div id="loader" class="hidden ml-3 w-6 h-6 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
            </button>
        </div>
    </div>

    <!-- 生成結果區 -->
    <div id="resultArea" class="hidden max-w-6xl mx-auto mt-16 space-y-12">
        <div class="grid md:grid-cols-2 gap-10">
            <div class="flex flex-col items-center">
                <span class="mb-4 bg-slate-800 text-white px-4 py-1 rounded-full text-[10px] font-black tracking-widest uppercase">直式宣傳版</span>
                <div class="canvas-container w-full max-w-[400px]">
                    <canvas id="canvasPortrait" width="1080" height="1920"></canvas>
                </div>
                <button onclick="download('canvasPortrait')" class="mt-4 text-blue-600 font-bold hover:underline">儲存直式圖</button>
            </div>
            <div class="flex flex-col items-center">
                <span class="mb-4 bg-slate-800 text-white px-4 py-1 rounded-full text-[10px] font-black tracking-widest uppercase">橫式宣傳版</span>
                <div class="canvas-container w-full">
                    <canvas id="canvasLandscape" width="1920" height="1080"></canvas>
                </div>
                <button onclick="download('canvasLandscape')" class="mt-4 text-blue-600 font-bold hover:underline">儲存橫式圖</button>
            </div>
        </div>
    </div>

    <script>
        // 設定預設時間
        document.getElementById('eventDate').value = new Date().toISOString().split('T')[0];
        document.getElementById('eventTime').value = "14:00";

        let processedImg = null;
        let isRemovingBg = false;

        // 1. 照片去背邏輯 (含進度顯示)
        document.getElementById('photoUpload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const progressArea = document.getElementById('progressArea');
            const progressBar = document.getElementById('progressBar');
            const progressPercent = document.getElementById('progressPercent');
            const uploadUI = document.getElementById('uploadUI');

            isRemovingBg = true;
            uploadUI.classList.add('hidden');
            progressArea.classList.remove('hidden');

            try {
                const config = {
                    progress: (fraction) => {
                        const p = Math.round(fraction * 100);
                        progressBar.style.width = p + "%";
                        progressPercent.innerText = `AI 正在移除背景: ${p}%`;
                    }
                };
                
                const blob = await imglyRemoveBackground(file, config);
                const url = URL.createObjectURL(blob);
                
                const img = new Image();
                img.onload = () => {
                    processedImg = img;
                    isRemovingBg = false;
                    progressPercent.innerText = "✅ 照片處理完成";
                    progressPercent.className = "text-[10px] text-green-600 mt-2 font-bold";
                };
                img.src = url;

            } catch (err) {
                console.error(err);
                alert("去背失敗，將改用原始照片。");
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => { processedImg = img; isRemovingBg = false; };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
                uploadUI.classList.remove('hidden');
                progressArea.classList.add('hidden');
            }
        });

        // 2. 藝術風格定義
        const ART_STYLES = ["梵谷星夜", "包浩斯幾何", "莫蘭迪灰", "賽博龐克霓虹", "瑞士極簡", "日系禪意"];

        // 3. 串接 Gemini 並生成
        document.getElementById('mainBtn').addEventListener('click', async () => {
            const apiKey = document.getElementById('apiKey').value.trim();
            const title = document.getElementById('eventTitle').value.trim();
            const name = document.getElementById('speakerName').value.trim();
            const apiStatusArea = document.getElementById('apiStatusArea');
            const apiStatusText = document.getElementById('apiStatusText');

            if (!apiKey || !title || !name || !processedImg) {
                alert("請確認：1.已輸入金鑰 2.已填寫資料 3.已上傳照片");
                return;
            }

            if (isRemovingBg) return alert("請等待照片去背完成");

            // 重置狀態
