<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 海報生成系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .canvas-container { display: none; }
        canvas { max-width: 100%; height: auto; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .progress-bar { width: 0%; transition: width 0.3s ease-in-out; }
    </style>
</head>
<body class="py-10 px-4">
    <div class="max-w-xl mx-auto bg-white p-8 rounded-[2rem] shadow-xl">
        <h1 class="text-3xl font-black text-center mb-6 tracking-tight text-slate-800">AI 海報生成器</h1>
        
        <div class="space-y-4">
            <!-- API Key -->
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1 ml-2">GEMINI API 金鑰</label>
                <input type="password" id="apiKey" class="w-full p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-blue-500" placeholder="貼上您的 API 金鑰">
            </div>

            <!-- 活動與姓名 -->
            <input type="text" id="eventTitle" class="w-full p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-blue-500" placeholder="活動名稱（例如：AI 未來論壇）">
            <input type="text" id="name" class="w-full p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-blue-500" placeholder="主講人姓名">
            
            <!-- 日期時間 -->
            <div class="grid grid-cols-2 gap-4">
                <input type="date" id="date" class="p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-blue-500 text-sm">
                <input type="time" id="time" class="p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-blue-500 text-sm">
            </div>

            <!-- 上傳區域與進度條 -->
            <div class="relative border-2 border-dashed border-slate-200 rounded-2xl p-6 text-center hover:bg-slate-50 transition cursor-pointer">
                <input type="file" id="photoUpload" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                <div id="uploadInfo">
                    <p id="uploadText" class="text-blue-600 font-bold">點擊上傳主講人照片</p>
                    <p class="text-xs text-slate-400 mt-1">建議使用清晰的半身照</p>
                </div>
                <!-- 進度條容器 -->
                <div id="progressWrapper" class="hidden mt-4">
                    <div class="w-full bg-slate-100 rounded-full h-2.5">
                        <div id="progressBar" class="progress-bar bg-blue-600 h-2.5 rounded-full"></div>
                    </div>
                    <p id="progressPercent" class="text-[10px] text-slate-500 mt-1">0%</p>
                </div>
            </div>

            <!-- 生成按鈕 -->
            <button id="generateBtn" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-black text-lg hover:bg-black active:scale-[0.98] transition-all flex justify-center items-center">
                <span id="btnText">生成專屬宣傳海報</span>
                <div id="btnLoader" class="hidden ml-3 w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
            </button>
            <p id="msg" class="text-center text-xs text-slate-400 mt-2 font-medium"></p>
        </div>
    </div>

    <!-- 結果區 -->
    <div id="resultArea" class="canvas-container max-w-6xl mx-auto mt-16 grid md:grid-cols-2 gap-10">
        <div class="flex flex-col items-center">
            <h3 class="mb-4 font-black text-slate-400 text-xs tracking-widest uppercase">直式宣傳版 (9:16)</h3>
            <canvas id="pCanvas" width="1080" height="1920" class="w-full max-w-xs"></canvas>
            <button onclick="download('pCanvas')" class="mt-4 text-blue-600 font-bold hover:underline text-sm">下載直式海報</button>
        </div>
        <div class="flex flex-col items-center">
            <h3 class="mb-4 font-black text-slate-400 text-xs tracking-widest uppercase">橫式活動版 (16:9)</h3>
            <canvas id="lCanvas" width="1920" height="1080" class="w-full max-w-lg"></canvas>
            <button onclick="download('lCanvas')" class="mt-4 text-blue-600 font-bold hover:underline text-sm">下載橫式海報</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
