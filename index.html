<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 2.0 海報生成器</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #444; }
        input[type="text"], input[type="date"], input[type="time"], textarea, input[type="password"] {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px;
        }
        .btn-generate {
            width: 100%; padding: 15px; background-color: #1a73e8; color: white; border: none; border-radius: 8px;
            font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-generate:hover { background-color: #1557b0; }
        .btn-generate:disabled { background-color: #ccc; cursor: not-allowed; }

        /* 進度條 */
        .progress-wrapper { display: none; margin-top: 10px; }
        .progress-bar { width: 100%; background: #eee; border-radius: 10px; overflow: hidden; height: 10px; }
        .progress-fill { width: 0%; height: 100%; background: #34a853; transition: width 0.2s; }
        
        /* 狀態訊息 */
        #statusDisplay { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; font-size: 13px; line-height: 1.6; }
        .status-error { background: #fdecea; color: #d93025; border: 1px solid #f5c2c7; }
        .status-success { background: #e6f4ea; color: #1e8e3e; border: 1px solid #badbcc; }

        #resultArea { margin-top: 25px; text-align: center; }
        #outputImage { max-width: 100%; border-radius: 10px; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .loader { display: none; color: #666; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>Gemini 2.0 海報生成器</h2>

    <div class="form-group">
        <label>Gemini API Key</label>
        <input type="password" id="apiKey" placeholder="請貼上您的 API 金鑰">
    </div>

    <div class="form-group" style="display: flex; gap: 10px;">
        <div style="flex: 1;">
            <label>主講人姓名</label>
            <input type="text" id="name" placeholder="例如：李小龍">
        </div>
        <div style="flex: 1;">
            <label>活動名稱</label>
            <input type="text" id="eventTitle" placeholder="例如：武術大會">
        </div>
    </div>

    <div class="form-group" style="display: flex; gap: 10px;">
        <div style="flex: 1;">
            <label>日期</label>
            <input type="date" id="date">
        </div>
        <div style="flex: 1;">
            <label>時間</label>
            <input type="time" id="time">
        </div>
    </div>

    <div class="form-group">
        <label>上傳照片 (將作為 AI 參考)</label>
        <input type="file" id="photoInput" accept="image/*">
        <div class="progress-wrapper" id="progWrapper">
            <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
            <small id="progText">讀取中 0%</small>
        </div>
    </div>

    <div class="form-group">
        <label>AI 生成註解 (風格、顏色要求)</label>
        <textarea id="aiPrompt" rows="3" placeholder="例如：請生成一張具備未來感、JPEG 格式、賽博龐克風格的海報，使用藍色與粉紅色調。"></textarea>
    </div>

    <button class="btn-generate" id="generateBtn">生成海報 (JPEG)</button>

    <div id="statusDisplay"></div>

    <div id="resultArea">
        <p class="loader" id="loaderText">🚀 AI 正在串接並繪製海報，請稍候約 10-30 秒...</p>
        <img id="outputImage" alt="Generated Poster">
    </div>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    const generateBtn = document.getElementById('generateBtn');
    const statusDisplay = document.getElementById('statusDisplay');
    const outputImage = document.getElementById('outputImage');
    const loaderText = document.getElementById('loaderText');
    
    let base64Photo = "";

    // 上傳進度處理
    document.getElementById('photoInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        document.getElementById('progWrapper').style.display = 'block';
        const reader = new FileReader();

        reader.onprogress = (event) => {
            if (event.lengthComputable) {
                const percent = Math.round((event.loaded / event.total) * 100);
                document.getElementById('progFill').style.width = percent + '%';
                document.getElementById('progText').innerText = `照片讀取中 ${percent}%`;
            }
        };

        reader.onload = (e) => {
            base64Photo = e.target.result.split(',')[1];
            document.getElementById('progText').innerText = "照片讀取完成！";
        };
        reader.readAsDataURL(file);
    });

    // 顯示錯誤或成功訊息
    function updateStatus(message, isError) {
        statusDisplay.style.display = 'block';
        statusDisplay.className = isError ? 'status-error' : 'status-success';
        statusDisplay.innerHTML = isError ? `<strong>API 串接失敗</strong><br>代碼訊息：${message}` : message;
    }

    generateBtn.addEventListener('click', async () => {
        const key = document.getElementById('apiKey').value.trim();
        const name = document.getElementById('name').value;
        const event = document.getElementById('eventTitle').value;
        const date = document.getElementById('date').value;
        const time = document.getElementById('time').value;
        const extraPrompt = document.getElementById('aiPrompt').value;

        if (!key) { updateStatus("請先輸入 API Key", true); return; }

        // 重置 UI
        updateStatus("", false);
        statusDisplay.style.display = 'none';
        outputImage.style.display = 'none';
        loaderText.style.display = 'block';
        generateBtn.disabled = true;

        try {
            // 使用目前的 2.0 實驗版本，這是目前最穩定的名稱
            const genAI = new GoogleGenerativeAI(key);
            const model = genAI.getGenerativeModel({ model: "gemini-2.0-flash-exp" });

            // 構建提示詞 - 強調 JPEG 格式，不接受 SVG
            const prompt = `You are a professional graphic designer. 
            Generate a high-resolution EVENT POSTER in JPEG format (Base64). 
            Do NOT output SVG code, Do NOT output Markdown. 
            Event Details:
            - Title: ${event}
            - Speaker: ${name}
            - Date/Time: ${date} ${time}
            - Style requirements: ${extraPrompt}
            
            Return the result as a raw Base64 string of a JPEG image.`;

            let payload = [prompt];
            if (base64Photo) {
                payload.push({
                    inlineData: { data: base64Photo, mimeType: "image/jpeg" }
                });
            }

            // 執行生成
            const result = await model.generateContent(payload);
            const response = await result.response;
            const text = response.text();

            updateStatus("API 連線成功！正在解析圖片數據...", false);

            // 嘗試從回傳中尋找 Base64 圖片數據
            // 註：若 AI 回傳文字描述而非圖片，通常是因為 API Key 權限問題
            if (text.length > 500) { // 簡單判斷是否為數據流
                outputImage.src = `data:image/jpeg;base64,${text.replace(/[\n\r\s]/g, '')}`;
                outputImage.style.display = 'block';
                updateStatus("海報生成成功 (JPEG)", false);
            } else {
                updateStatus(`API 連線成功，但模型未回傳圖片二進位檔。模型回傳：${text.substring(0, 100)}...`, true);
            }

        } catch (error) {
            console.error(error);
            // 抓取詳細錯誤訊息 (例如 404, 403, 429 等)
            updateStatus(error.message, true);
        } finally {
            generateBtn.disabled = false;
            loaderText.style.display = 'none';
        }
    });
</script>

</body>
</html>
