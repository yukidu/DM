<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 視覺海報設計師</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .poster-view svg { width: 100%; height: auto; border-radius: 1.5rem; filter: drop-shadow(0 20px 25px rgba(0,0,0,0.1)); }
    </style>
</head>
<body class="py-10 px-4">

    <div class="max-w-xl mx-auto bg-white p-8 rounded-[2.5rem] shadow-2xl border border-gray-100">
        <h1 class="text-3xl font-black text-center mb-2 tracking-tighter text-slate-800">AI 視覺設計師</h1>
        <p class="text-center text-slate-400 text-sm mb-8">所有設計邏輯由 Gemini 2.5 API 運算生成</p>
        
        <div class="space-y-4">
            <!-- API 設定 -->
            <input type="password" id="apiKey" class="w-full p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="貼上您的 Gemini API 金鑰">

            <!-- 資料輸入 -->
            <input type="text" id="eventTitle" class="w-full p-4 bg-slate-50 rounded-2xl border-none" placeholder="活動名稱">
            <input type="text" id="speakerName" class="w-full p-4 bg-slate-50 rounded-2xl border-none" placeholder="主講人姓名">
            
            <div class="grid grid-cols-2 gap-4">
                <input type="date" id="eventDate" class="p-4 bg-slate-50 rounded-2xl border-none text-sm">
                <input type="time" id="eventTime" class="p-4 bg-slate-50 rounded-2xl border-none text-sm">
            </div>

            <!-- 照片上傳與進度顯示 -->
            <label for="photoUpload" class="relative block border-2 border-dashed border-slate-200 rounded-3xl p-6 text-center hover:bg-slate-50 transition cursor-pointer">
                <input type="file" id="photoUpload" accept="image/*" class="hidden">
                <div id="uploadStatus" class="text-blue-600 font-bold">📷 點擊上傳主講人照片</div>
                <div class="w-full bg-slate-100 rounded-full h-1.5 mt-4 hidden" id="progressParent">
                    <div id="progressBar" class="bg-blue-600 h-1.5 rounded-full w-0 transition-all duration-300"></div>
                </div>
            </label>

            <!-- API 狀態診斷 -->
            <div id="apiStatus" class="hidden p-4 rounded-2xl text-xs font-mono border-l-4"></div>

            <!-- 唯一按鈕：生成 -->
            <button id="generateBtn" class="w-full py-5 bg-slate-900 text-white rounded-3xl font-black text-xl hover:bg-black active:scale-95 transition-all shadow-xl flex justify-center items-center">
                <span id="btnText">啟動 AI 智能設計</span>
                <div id="loader" class="hidden ml-3 w-6 h-6 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
            </button>
        </div>
    </div>

    <!-- 結果區 -->
    <div id="resultArea" class="hidden max-w-6xl mx-auto mt-20 space-y-16 pb-20">
        <div class="grid md:grid-cols-2 gap-12">
            <div class="flex flex-col items-center">
                <span class="mb-4 text-xs font-black text-slate-300 uppercase tracking-widest">直式海報 (9:16)</span>
                <div id="portraitOutput" class="poster-view w-full max-w-[400px]"></div>
            </div>
            <div class="flex flex-col items-center">
                <span class="mb-4 text-xs font-black text-slate-300 uppercase tracking-widest">橫式海報 (16:9)</span>
                <div id="landscapeOutput" class="poster-view w-full"></div>
            </div>
        </div>
    </div>

    <script>
        // 初始化日期
        document.getElementById('eventDate').value = new Date().toISOString().split('T')[0];
        document.getElementById('eventTime').value = "14:00";

        let base64Photo = "";

        // 處理照片與進度
        document.getElementById('photoUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const progressParent = document.getElementById('progressParent');
            const progressBar = document.getElementById('progressBar');
            const uploadStatus = document.getElementById('uploadStatus');

            progressParent.classList.remove('hidden');
            uploadStatus.innerText = "正在讀取照片...";

            const reader = new FileReader();
            reader.onprogress = (ev) => {
                if (ev.lengthComputable) {
                    const progress = Math.round((ev.loaded / ev.total) * 100);
                    progressBar.style.width = progress + "%";
                }
            };

            reader.onload = (ev) => {
                base64Photo = ev.target.result;
                uploadStatus.innerText = "✅ 照片讀取成功";
                uploadStatus.classList.replace('text-blue-600', 'text-green-600');
            };
            reader.readAsDataURL(file);
        });

        // 串接 Gemini 2.5 API
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const key = document.getElementById('apiKey').value.trim();
            const title = document.getElementById('eventTitle').value.trim();
            const name = document.getElementById('speakerName').value.trim();
            const date = document.getElementById('eventDate').value;
            const time = document.getElementById('eventTime').value;

            const status = document.getElementById('apiStatus');
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btnText');

            if (!key || !title || !name || !base64Photo) {
                alert("請完整填寫資料並上傳照片");
                return;
            }

            // 更新 UI 狀態
            status.className = "p-4 rounded-2xl text-xs font-mono border-l-4 bg-blue-50 border-blue-500 text-blue-700 block";
            status.innerText = "⏳ 正在請求 Gemini 2.5 設計視覺中...";
            loader.classList.remove('hidden');
            btnText.innerText = "AI 運算中...";

            // Prompt 設計：要求 AI 產生兩組 SVG
            const prompt = `你是一位世界級平面設計大師。請為活動「${title}」設計兩款宣傳海報。
            主講人：${name}
            日期時間：${date} ${time}

            任務要求：
            1. 隨機參考一種知名的世界藝術風格（如：梵谷、包浩斯幾何、莫蘭迪色系、賽博龐克等），風格要明顯且具藝術感。
            2. 海報內容必須為「繁體中文」。
            3. 產生兩組 SVG 程式碼：
               - 一組直式 (比例 9:16，寬1080高1920)。
               - 一組橫式 (比例 16:9，寬1920高1080)。
            4. 在 SVG 中，照片請使用 <image x="..." y="..." width="..." height="..." href="SPEAKER_PHOTO" /> 標籤。請根據風格決定照片的擺放位置與大小。
            5. 海報背景要與照片色調和藝術風格協調。
            6. 僅回傳 JSON 格式，結構如下：
               {"portrait_svg": "...", "landscape_svg": "..."}
            7. 不要回傳任何 markdown 或解釋，只要 JSON。`;

            try {
                // 使用最新 2.0/2.5 flash 模型串接
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [
                            {
                                parts: [
                                    { text: prompt },
                                    { inline_data: { mime_type: "image/jpeg", data: base64Photo.split(',')[1] } }
                                ]
                            }
                        ],
                        generationConfig: { response_mime_type: "application/json" }
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw { code: response.status, message: err.error.message };
                }

                const data = await response.json();
                const result = JSON.parse(data.candidates[0].content.parts[0].text);

                // 將照片嵌入回 SVG
                const pSvg = result.portrait_svg.replace(/SPEAKER_PHOTO/g, base64Photo);
                const lSvg = result.landscape_svg.replace(/SPEAKER_PHOTO/g, base64Photo);

                document.getElementById('portraitOutput').innerHTML = pSvg;
                document.getElementById('landscapeOutput').innerHTML = lSvg;
                document.getElementById('resultArea').classList.remove('hidden');

                status.className = "p-4 rounded-2xl text-xs font-mono border-l-4 bg-green-50 border-green-500 text-green-700 block";
                status.innerText = "✅ 連線成功：AI 設計已完成渲染。";
                
                window.scrollTo({ top: document.getElementById('resultArea').offsetTop - 50, behavior: 'smooth' });

            } catch (err) {
                status.className = "p-4 rounded-2xl text-xs font-mono border-l-4 bg-red-50 border-red-500 text-red-700 block";
                status.innerText = `❌ API 串接失敗：[代碼 ${err.code || '網路錯誤'}] ${err.message || '未知錯誤'}`;
                console.error(err);
            } finally {
                loader.classList.add('hidden');
                btnText.innerText = "啟動 AI 智能設計";
            }
        });
    </script>
</body>
</html>
