<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 海報生成器 (Gemini 2.0)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 2s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #posterOutput svg { width: 100%; height: auto; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h1 class="text-2xl font-bold mb-6 text-gray-800 border-b pb-2">Gemini 2.0 AI 海報生成系統</h1>

        <!-- API 配置區 -->
        <div class="mb-6 p-4 bg-blue-50 rounded-lg">
            <label class="block text-sm font-medium text-gray-700">Gemini API Key</label>
            <input type="password" id="apiKey" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" placeholder="在此貼上您的 Google AI API Key">
            <p id="apiStatus" class="mt-2 text-sm text-gray-500">狀態: 尚未連接</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- 輸入區域 -->
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">主講人姓名</label>
                    <input type="text" id="name" class="mt-1 block w-full border rounded-md p-2" placeholder="例如：王小明">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">活動名稱</label>
                    <input type="text" id="eventTitle" class="mt-1 block w-full border rounded-md p-2" placeholder="例如：2025 AI 未來趨勢論壇">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">活動日期</label>
                        <input type="date" id="eventDate" class="mt-1 block w-full border rounded-md p-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">活動時間</label>
                        <input type="time" id="eventTime" class="mt-1 block w-full border rounded-md p-2">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">其他設計註解 (風格、顏色等)</label>
                    <textarea id="customPrompt" rows="3" class="mt-1 block w-full border rounded-md p-2" placeholder="例如：希望是極簡科技風，配色以深藍色為主..."></textarea>
                </div>
                
                <!-- 檔案上傳 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700">上傳主講人照片</label>
                    <input type="file" id="photoInput" accept="image/*" class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    <div id="uploadProgressContainer" class="hidden mt-2">
                        <div class="w-full bg-gray-200 rounded-full h-2.5">
                            <div id="uploadProgressBar" class="bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div>
                        </div>
                        <p id="uploadStatus" class="text-xs text-gray-500 mt-1">讀取照片中：0%</p>
                    </div>
                </div>

                <button onclick="generatePoster()" id="generateBtn" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-3 px-4 rounded-lg hover:from-blue-700 hover:to-indigo-700 transition duration-300 shadow-lg">
                    生成隨機設計海報
                </button>
            </div>

            <!-- 輸出區域 -->
            <div class="border-2 border-dashed border-gray-200 rounded-lg p-4 flex flex-col items-center justify-center bg-gray-50 relative min-h-[400px]">
                <div id="loadingOverlay" class="hidden absolute inset-0 bg-white bg-opacity-80 flex flex-col items-center justify-center z-10">
                    <div class="loader mb-4"></div>
                    <p class="text-blue-600 font-medium">AI 正在構思設計並生成海報...</p>
                </div>
                
                <div id="posterOutput" class="w-full h-full flex items-center justify-center">
                    <p class="text-gray-400">海報將在此顯示</p>
                </div>
                
                <div id="errorMessage" class="hidden mt-4 p-3 bg-red-100 text-red-700 rounded-md w-full text-sm break-all"></div>
            </div>
        </div>
    </div>

    <script>
        let base64Image = null;

        // 處理照片上傳進度
        document.getElementById('photoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            const container = document.getElementById('uploadProgressContainer');
            const bar = document.getElementById('uploadProgressBar');
            const status = document.getElementById('uploadStatus');

            container.classList.remove('hidden');
            
            reader.onprogress = function(event) {
                if (event.lengthComputable) {
                    const percent = Math.round((event.loaded / event.total) * 100);
                    bar.style.width = percent + '%';
                    status.innerText = `讀取照片中：${percent}%`;
                }
            };

            reader.onload = function(e) {
                base64Image = e.target.result.split(',')[1];
                bar.style.width = '100%';
                status.innerText = '照片讀取完成！';
                setTimeout(() => container.classList.add('hidden'), 2000);
            };

            reader.readAsDataURL(file);
        });

        async function generatePoster() {
            const apiKey = document.getElementById('apiKey').value;
            const apiStatus = document.getElementById('apiStatus');
            const posterOutput = document.getElementById('posterOutput');
            const loadingOverlay = document.getElementById('loadingOverlay');
            const errorMessage = document.getElementById('errorMessage');

            // 初始化與檢查
            errorMessage.classList.add('hidden');
            if (!apiKey) {
                alert("請輸入 API Key");
                return;
            }

            const data = {
                name: document.getElementById('name').value || "未命名",
                title: document.getElementById('eventTitle').value || "精彩活動",
                date: document.getElementById('eventDate').value,
                time: document.getElementById('eventTime').value,
                note: document.getElementById('customPrompt').value
            };

            loadingOverlay.classList.remove('hidden');
            apiStatus.innerText = "狀態: 正在通訊中...";

            try {
                // 建構 Prompt
                const promptText = `
                    你是一位專業的平面設計師。請根據以下資訊，生成一張高品質、現代化的活動海報。
                    請「直接輸出」一段完整的 SVG 代碼，不要有任何 Markdown (如 \`\`\`svg)。
                    
                    海報資訊：
                    - 主講人：${data.name}
                    - 活動名稱：${data.title}
                    - 時間：${data.date} ${data.time}
                    - 設計風格備註：${data.note}
                    
                    技術要求：
                    1. SVG 比例為 2:3 (例如 width="400" height="600")。
                    2. 如果有提供照片(base64)，請在 SVG 中使用 <image> 標籤呈現。
                    3. 排版要美觀，文字要清晰，包含背景裝飾。
                    4. 風格請根據備註隨機變換，展現創意。
                `;

                const payload = {
                    contents: [{
                        parts: [
                            { text: promptText },
                            ...(base64Image ? [{ inline_data: { mime_type: "image/jpeg", data: base64Image } }] : [])
                        ]
                    }]
                };

                // 呼叫 Gemini 2.0 API (目前使用 flash-experimental)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error?.message || `HTTP Error ${response.status}`);
                }

                const svgCode = result.candidates[0].content.parts[0].text;
                
                // 檢查是否成功串接
                apiStatus.innerText = "狀態: 連線成功！";
                apiStatus.className = "mt-2 text-sm text-green-600";

                // 顯示結果 (清理掉可能存在的 Markdown 標籤)
                const cleanSvg = svgCode.replace(/```svg|```/g, '').trim();
                posterOutput.innerHTML = cleanSvg;

            } catch (error) {
                console.error(error);
                apiStatus.innerText = "狀態: 連線失敗";
                apiStatus.className = "mt-2 text-sm text-red-600";
                errorMessage.innerText = `詳細錯誤訊息: ${error.message}`;
                errorMessage.classList.remove('hidden');
                posterOutput.innerHTML = `<p class="text-red-400">無法生成海報</p>`;
            } finally {
                loadingOverlay.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
