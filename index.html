<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 視覺海報設計師</title>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 480px; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; font-size: 16px; }
        .row { display: flex; gap: 10px; }
        button { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        #genBtn { background: #2563eb; color: white; }
        #randBtn { background: #0f172a; color: white; font-size: 15px; }
        #status { font-size: 13px; color: #475569; margin-top: 20px; padding: 12px; background: #f1f5f9; border-radius: 10px; min-height: 20px; word-break: break-all; border-left: 4px solid #2563eb; line-height: 1.5; }
        #result { display: none; margin-top: 40px; width: 100%; max-width: 1000px; }
        .canvas-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 700px) { .canvas-grid { grid-template-columns: 1fr; } }
        canvas { width: 100%; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); }
        .dl-btn { text-align: center; display: block; margin-top: 15px; color: #2563eb; text-decoration: none; font-weight: bold; font-size: 14px; }
        #uploadBox { border: 2px dashed #cbd5e1; padding: 30px; text-align: center; cursor: pointer; border-radius: 16px; color: #64748b; font-weight: bold; margin: 15px 0; transition: 0.3s; }
        #uploadBox:hover { border-color: #2563eb; background: #f8fafc; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="margin:0 0 5px 0; text-align:center;">AI 視覺設計師</h2>
        <p style="text-align:center; color:#94a3b8; font-size:14px; margin-bottom:20px;">由 Gemini 1.5 提供設計方案</p>
        
        <input type="password" id="key" placeholder="貼上金鑰 (AIza...)">
        <input type="text" id="title" placeholder="活動名稱">
        <input type="text" id="user" placeholder="主講人姓名">
        <div class="row">
            <input type="date" id="date">
            <input type="time" id="time">
        </div>
        <div id="uploadBox">
            <input type="file" id="file" style="display:none" accept="image/*">
            <span id="upTxt">📷 點擊上傳照片</span>
        </div>
        <button id="genBtn">啟動 AI 智能設計</button>
        <button id="randBtn">🎲 隨機變換藝術風格</button>
        <div id="status">準備就緒。</div>
    </div>

    <div id="result">
        <div class="canvas-grid">
            <div style="display:flex; flex-direction:column; align-items:center;">
                <canvas id="pc" width="1080" height="1920"></canvas>
                <a href="#" class="dl-btn" onclick="download('pc')">下載直式圖</a>
            </div>
            <div style="display:flex; flex-direction:column; align-items:center;">
                <canvas id="lc" width="1920" height="1080"></canvas>
                <a href="#" class="dl-btn" onclick="download('lc')">下載橫式圖</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('date').value = new Date().toISOString().split('T')[0];
        document.getElementById('time').value = "14:00";

        let imgObj = null;
        const upBox = document.getElementById('uploadBox');
        const fileIn = document.getElementById('file');
        const status = document.getElementById('status');

        upBox.onclick = () => fileIn.click();
        fileIn.onchange = (e) => {
            const f = e.target.files[0];
            if (!f) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    imgObj = img;
                    status.innerText = "✅ 照片讀取成功！";
                    upBox.style.borderColor = "#2563eb";
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(f);
        };

        document.getElementById('genBtn').onclick = () => startAI(false);
        document.getElementById('randBtn').onclick = () => startAI(true);

        async function startAI(isRandom) {
            const key = document.getElementById('key').value.trim();
            const title = document.getElementById('title').value.trim();
            const user = document.getElementById('user').value.trim();

            if (!title || !user || !imgObj) return alert("請填寫所有欄位並上傳照片");

            status.innerText = "🤖 AI 設計師正在尋找最佳通訊路徑...";
            
            let config = { bg: "#ffffff", text: "#000000", accent: "#2563eb", slogan: "突破自我，共創未來", layout: "center" };

            if (key) {
                const styles = ["梵谷", "包浩斯", "莫蘭迪", "賽博龐克", "瑞士極簡", "日系禪意"];
                const randomStyle = styles[Math.floor(Math.random() * styles.length)];
                const prompt = `你是一位專業設計師。活動「${title}」，講者「${user}」。${isRandom ? `風格：${randomStyle}。` : ''}請回傳 JSON：{"bg":"背景色16進位","text":"文字色16進位","accent":"強調色16進位","slogan":"8字內標語","layout":"center或split"}。嚴禁其他文字。`;

                try {
                    // 自動嘗試不同版本路徑
                    const versions = ['v1beta', 'v1'];
                    let response = null;
                    let lastError = "";

                    for (let ver of versions) {
                        try {
                            const url = `https://generativelanguage.googleapis.com/${ver}/models/gemini-1.5-flash:generateContent?key=${key}`;
                            const res = await fetch(url, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                            });
                            if (res.ok) {
                                response = res;
                                break;
                            } else {
                                const errJson = await res.json();
                                lastError = errJson.error.message;
                            }
                        } catch (e) {
                            lastError = e.message;
                        }
                    }

                    if (!response) throw new Error(lastError || "所有 API 路徑皆無法連線");

                    const data = await response.json();
                    const rawText = data.candidates[0].content.parts[0].text;
                    const jsonMatch = rawText.match(/\{[\s\S]*\}/);
                    
                    if (jsonMatch) {
                        config = JSON.parse(jsonMatch[0]);
                        status.innerText = `✨ AI 設計成功！已套用 ${isRandom ? randomStyle : '專業'} 方案。`;
                    }
                } catch (err) {
                    console.error(err);
                    status.innerText = "❌ AI 串接失敗，改用預設設計。原因：" + err.message;
                }
            } else {
                status.innerText = "💡 未輸入金鑰，採用預設美感模式。";
            }

            draw('pc', title, user, config);
            draw('lc', title, user, config);
            document.getElementById('result').style.display = "block";
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function draw(id, title, user, conf) {
            const cvs = document.getElementById(id);
            const ctx = cvs.getContext('2d');
            const w = cvs.width, h = cvs.height;
            const isP = h > w;

            ctx.fillStyle = conf.bg;
            ctx.fillRect(0, 0, w, h);

            ctx.globalAlpha = 0.2;
            ctx.fillStyle = conf.accent;
            ctx.beginPath();
            ctx.arc(w * Math.random(), h * 0.2, w * 0.6, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1.0;

            if (imgObj) {
                const r = isP ? (w * 0.9) / imgObj.width : (h * 0.85) / imgObj.height;
                const dw = imgObj.width * r, dh = imgObj.height * r;
                const dx = isP ? (w - dw) / 2 : w - dw;
                const dy = h - dh;
                ctx.drawImage(imgObj, dx, dy, dw, dh);
            }

            ctx.fillStyle = conf.text;
            ctx.textAlign = isP ? "center" : "left";
            const x = isP ? w/2 : 100;

            ctx.font = `900 ${w * 0.09}px sans-serif`;
            ctx.fillText(title, x, h * 0.18);
            ctx.fillStyle = conf.accent;
            ctx.font = `bold ${w * 0.045}px sans-serif`;
            ctx.fillText(conf.slogan, x, h * 0.26);
            ctx.fillStyle = conf.text;
            ctx.font = `900 ${w * 0.07}px sans-serif`;
            ctx.fillText(`主講｜${user}`, x, h * 0.36);
            ctx.font = `bold ${w * 0.035}px sans-serif`;
            const dateStr = document.getElementById('date').value.replace(/-/g, '/') + " " + document.getElementById('time').value;
            ctx.fillText(dateStr, x, h * 0.44);

            ctx.strokeStyle = conf.accent;
            ctx.lineWidth = 15;
            ctx.strokeRect(40, 40, w - 80, h - 80);
        }

        function download(id) {
            const a = document.createElement('a');
            a.download = `AI海報-${id}.png`;
            a.href = document.getElementById(id).toDataURL('image/png');
            a.click();
        }
    </script>
</body>
</html>
