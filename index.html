<!DOCTYPE html>
<html lang="zh-TW">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 視覺海報設計師</title>

        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; }
        .canvas-container { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); border-radius: 1.5rem; overflow: hidden; background: #e5e7eb; }
        canvas { width: 100%; height: auto; display: block; }
        .progress-bar { transition: width 0.3s ease; }
    </style>
</head>
<body class="py-10 px-4">

    <div class="max-w-2xl mx-auto bg-white p-8 rounded-[2.5rem] shadow-xl border border-gray-100">

                <div>

                    <input type="password" id="apiKey" class="w-full p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="請貼上您的 API 金鑰">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="eventTitle" class="w-full p-4 bg-slate-50 rounded-2xl border-none text-sm" placeholder="活動名稱 (例如：未來創意論壇)">
                    <input type="text" id="speakerName" class="w-full p-4 bg-slate-50 rounded-2xl border-none text-sm" placeholder="講者姓名">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="date" id="eventDate" class="p-4 bg-slate-50 rounded-2xl border-none text-sm">
                    <input type="time" id="eventTime" class="p-4 bg-slate-50 rounded-2xl border-none text-sm">
                </div>
            </div>

            <!-- 照片上傳區 -->
            <label for="photoUpload" class="relative block border-2 border-dashed border-slate-200 rounded-3xl p-8 text-center hover:bg-slate-50 transition cursor-pointer group">
                <input type="file" id="photoUpload" accept="image/*" class="hidden">
                <div id="uploadUI">
                    <p id="uploadText" class="text-blue-600 font-black">📷 點擊上傳主講人照片</p>
                    <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-widest text-xs">系統將自動進行智慧去背</p>
                </div>
