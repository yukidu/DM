<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皇冠大使對焦系統 - 數位領導力</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" onload="initClient()"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #f0f2f5; }
        .gold-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%); }
        .card { background: white; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .input-group label { font-weight: 700; color: #374151; font-size: 0.9rem; }
        .input-style { border: 1px solid #d1d5db; border-radius: 10px; padding: 12px; width: 100%; margin-top: 4px; transition: 0.3s; }
        .input-style:focus { border-color: #1e40af; ring: 2px; outline: none; box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.2); }
        .btn-action { background: #d97706; color: white; padding: 15px 30px; border-radius: 12px; font-weight: bold; width: 100%; transition: 0.3s; cursor: pointer; }
        .btn-action:hover { background: #b45309; transform: translateY(-2px); }
        .btn-action:disabled { background: #9ca3af; cursor: not-allowed; }
    </style>
</head>
<body class="pb-20">

    <div class="max-w-3xl mx-auto px-4 pt-8">
        <!-- Header Persona -->
        <div class="gold-gradient text-white p-10 rounded-t-3xl text-center relative overflow-hidden">
            <div class="relative z-10">
                <h1 class="text-4xl font-extrabold mb-3">💎 皇冠大使對焦室</h1>
                <p class="text-blue-100 text-lg">「不是在賣產品，是在賣一個改變生命的機會。」</p>
                <div id="userProfile" class="mt-4 text-sm hidden text-yellow-300">已成功連接 Google 帳戶</div>
            </div>
            <div class="absolute top-0 right-0 opacity-10 text-9xl font-bold">AMWAY</div>
        </div>

        <div class="card p-8 -mt-6">
            <!-- Auth Section -->
            <div class="mb-10 p-6 border-2 border-dashed border-blue-100 rounded-2xl bg-blue-50">
                <h3 class="font-bold text-blue-800 mb-2 text-center">第一步：啟動數位權限</h3>
                <p class="text-xs text-center text-gray-500 mb-4">請填入您在 Google Cloud 申請的 Client ID 以啟動登入功能</p>
                <input type="text" id="clientId" class="input-style mb-4" placeholder="請在此貼上您的 Google Client ID">
                <button onclick="handleAuthClick()" id="loginBtn" class="w-full bg-white border border-gray-300 text-gray-700 py-3 rounded-lg font-bold flex items-center justify-center hover:bg-gray-50 transition">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-6 h-6 mr-2">
                    登入 Google 帳號授權 Gemini
                </button>
            </div>

            <!-- Form Section -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="input-group">
                    <label>對象姓名</label>
                    <input type="text" id="name" class="input-style" placeholder="王大明">
                </div>
                <div class="input-group">
                    <label>年齡</label>
                    <input type="number" id="age" class="input-style" placeholder="30">
                </div>
                <div class="input-group">
                    <label>職業</label>
                    <input type="text" id="job" class="input-style" placeholder="傳統製造業主管">
                </div>
                <div class="input-group">
                    <label>是否已破題安麗？</label>
                    <select id="isRevealed" class="input-style">
                        <option value="完全沒提過">完全沒提過</option>
                        <option value="提過但不深入">提過但不深入</option>
                        <option value="知道我有在經營">知道我有在經營</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>是否參加過活動？</label>
                    <select id="hasAttended" class="input-style">
                        <option value="從未參加過">從未參加過</option>
                        <option value="看過線上分享">看過線上分享</option>
                        <option value="參加過實體家庭聚會">參加過實體家庭聚會</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>是否見過上手領導人？</label>
                    <select id="metUpline" class="input-style">
                        <option value="尚未見過面">尚未見過面</option>
                        <option value="已經深談過一次">已經深談過一次</option>
                    </select>
                </div>
                <div class="md:col-span-2 input-group">
                    <label>我希望邀約他參加什麼活動？</label>
                    <input type="text" id="targetEvent" class="input-style" placeholder="下週二的創業商機論壇 (OPP)">
                </div>
                <div class="md:col-span-2 input-group">
                    <label>我希望推薦他什麼產品？</label>
                    <input type="text" id="targetProduct" class="input-style" placeholder="雙倍健與魚油、淨水器">
                </div>
            </div>

            <div class="mt-10">
                <button onclick="generateStrategy()" id="generateBtn" class="btn-action shadow-lg" disabled>
                    開始進行大師級對焦演練
                </button>
            </div>
        </div>

        <!-- Result Section -->
        <div id="resultArea" class="mt-8 hidden">
            <div class="card p-8 border-l-8 border-amber-500">
                <div class="flex items-center mb-6">
                    <div class="w-12 h-12 bg-amber-500 rounded-full flex items-center justify-center text-white font-bold text-xl mr-4">金</div>
                    <div>
                        <h2 class="text-xl font-bold text-gray-800">皇冠大使的實戰策略建議</h2>
                        <p class="text-sm text-gray-500">記住：邀約是為了對方的夢想，而不是你的業績。</p>
                    </div>
                </div>
                <hr class="mb-6">
                <div id="output" class="text-gray-700 leading-loose space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        let client;
        let accessToken = null;

        function initClient() {
            // 初始化時不帶 clientID，等用戶輸入
        }

        function handleAuthClick() {
            const clientId = document.getElementById('clientId').value;
            if (!clientId) {
                alert("請先輸入您的 Google Client ID。這可以在 Google Cloud Console 取得。");
                return;
            }

            client = google.accounts.oauth2.initTokenClient({
                client_id: clientId,
                scope: 'https://www.googleapis.com/auth/generative-language',
                callback: (response) => {
                    if (response.access_token) {
                        accessToken = response.access_token;
                        document.getElementById('userProfile').classList.remove('hidden');
                        document.getElementById('generateBtn').disabled = false;
                        document.getElementById('loginBtn').innerText = "✅ 已連結 Google Gemini";
                        document.getElementById('loginBtn').classList.add('bg-green-50');
                    }
                },
            });
            client.requestAccessToken();
        }

        async function generateStrategy() {
            if (!accessToken) return;

            const btn = document.getElementById('generateBtn');
            const output = document.getElementById('output');
            const resultArea = document.getElementById('resultArea');

            btn.disabled = true;
            btn.innerText = '正在調研對象並制定致勝話術...';

            const formData = {
                name: document.getElementById('name').value || '這位朋友',
                age: document.getElementById('age').value || '合適的年齡',
                job: document.getElementById('job').value || '目前這份職業',
                isRevealed: document.getElementById('isRevealed').value,
                hasAttended: document.getElementById('hasAttended').value,
                metUpline: document.getElementById('metUpline').value,
                targetEvent: document.getElementById('targetEvent').value || '未來的成功慶功宴',
                targetProduct: document.getElementById('targetProduct').value || '全方位營養組合'
            };

            const prompt = `你是一位安麗事業的傳奇企業家（皇冠大使），率領萬人團隊，財富數億。你的專業是透過深度溝通啟發他人夢想。
現在請針對以下對象進行「對焦」並給出實戰建議：
- 姓名：${formData.name}
- 年齡：${formData.age}
- 職業：${formData.job}
- 現況：${formData.isRevealed}、${formData.hasAttended}、${formData.metUpline}
- 目標活動：${formData.targetEvent}
- 目標產品：${formData.targetProduct}

請以「皇冠大使」極具感染力且專業的口吻，提供以下結構的建議（用台灣繁體中文）：

1. [策略思維] 分析這個人的背景，他在傳統行業可能面臨的危機是什麼？
2. [給夢想話術] 如何在聊天中不經意地帶入夢想與自由的價值？（逐字稿）
3. [正式邀約活動] 針對「${formData.targetEvent}」的邀約話術，要強調這不是會議，是個機會。（逐字稿）
4. [專業Q&A] 模擬如果他說「我沒時間」或「是直銷嗎？」你要如何以高度優雅地回覆？
5. [產品專業建議] 如何結合他的生活需求，推薦「${formData.targetProduct}」？`;

            try {
                const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const resData = await response.json();
                if (resData.error) throw new Error(resData.error.message);

                const text = resData.candidates[0].content.parts[0].text;
                resultArea.classList.remove('hidden');
                output.innerHTML = formatAIResponse(text);
                window.scrollTo({ top: resultArea.offsetTop - 20, behavior: 'smooth' });

            } catch (error) {
                alert('API 呼叫失敗：' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerText = '開始進行大師級對焦演練';
            }
        }

        function formatAIResponse(text) {
            return text
                .replace(/\n/g, '<br>')
                .replace(/\*\*(.*?)\*\*/g, '<strong class="text-blue-900 bg-yellow-100 px-1">$1</strong>')
                .replace(/### (.*?)/g, '<h3 class="text-xl font-bold mt-6 mb-2 text-amber-700 border-b-2 border-amber-200">$1</h3>')
                .replace(/[1-5]\./g, (match) => `<span class="inline-block bg-blue-800 text-white rounded-full w-6 h-6 text-center leading-6 mr-2">${match[0]}</span>`);
        }
    </script>
</body>
</html>
