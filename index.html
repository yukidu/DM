<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 視覺藝術海報生成器</title>
    <!-- 載入資源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@latest/dist/bundle.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; }
        .canvas-card { border-radius: 24px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2); background: #e5e7eb; }
        canvas { width: 100%; height: auto; display: block; }
        .progress-bar-inner { transition: width 0.3s ease-out; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-[2.5rem] shadow-xl border border-gray-100">
        <h1 class="text-3xl font-black text-center mb-6 tracking-tighter text-gray-800">AI 視覺藝術設計師</h1>
        
        <div class="space-y-5">
            <!-- 參數輸入 -->
            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1 ml-2 tracking-widest uppercase">GEMINI API 金鑰</label>
                    <input type="password" id="apiKey" class="w-full p-4 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-blue-500" placeholder="請在此輸入金鑰">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="eventTitle" class="w-full p-4 bg-gray-50 rounded-2xl border-none" placeholder="活動名稱 (例如：未來論壇)">
                    <input type="text" id="speakerName" class="w-full p-4 bg-gray-50 rounded-2xl border-none" placeholder="講者姓名">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="date" id="eventDate" class="p-4 bg-gray-50 rounded-2xl border-none">
                    <input type="time" id="eventTime" class="p-4 bg-gray-50 rounded-2xl border-none">
                </div>
            </div>

            <!-- 照片上傳與進度區 -->
            <label for="photoUpload" class="relative block border-2 border-dashed border-gray-200 rounded-3xl p-8 text-center hover:bg-gray-50 transition cursor-pointer group">
                <input type="file" id="photoUpload" accept="image/*" class="hidden">
                <div id="uploadUI">
                    <p id="uploadStatusText" class="text-blue-600 font-bold">📷 點擊上傳主講人照片</p>
                    <p class="text-[10px] text-gray-400 mt-1 uppercase tracking-widest">系統將自動進行智慧去背</p>
                </div>
                <!-- 進度條 -->
                <div id="progressArea" class="hidden mt-4">
                    <div class="w-full bg-gray-100 rounded-full h-2 overflow-hidden">
                        <div id="progressBar" class="progress-bar-inner bg-blue-600 h-full w-0"></div>
                    </div>
                    <p id="progressPercent" class="text-[10px] text-gray-500 mt-2 font-black italic">處理進度: 0%</p>
                </div>
            </label>

            <!-- API 診斷訊息區 -->
            <div id="apiStatusArea" class="hidden p-4 rounded-2xl text-xs font-bold border-l-4">
                <p id="apiStatusText"></p>
            </div>

            <!-- 生成按鈕 -->
            <button id="mainBtn" class="w-full py-5 bg-gray-900 text-white rounded-3xl font-black text-xl hover:bg-black active:scale-95 transition-all shadow-lg flex justify-center items-center group">
                <span id="btnText">啟動 AI 隨機設計</span>
                <div id="loader" class="hidden ml-3 w-6 h-6 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
            </button>
        </div>
    </div>

    <!-- 生成結果顯示區 -->
    <div id="resultArea" class="hidden max-w-6xl mx-auto mt-16 space-y-12">
        <div class="grid md:grid-cols-2 gap-12">
            <!-- 直式海報 -->
            <div class="flex flex-col items-center">
                <span class="mb-4 bg-gray-800 text-white px-5 py-1 rounded-full text-[10px] font-black tracking-widest uppercase">直式宣傳海報 (9:16)</span>
                <div class="canvas-card w-full max-w-[400px]">
                    <canvas id="canvasP" width="1080" height="1920"></canvas>
                </div>
                <button onclick="download('canvasP')" class="mt-4 text-blue-600 font-bold hover:underline">儲存此海報</button>
            </div>
            <!-- 橫式海報 -->
            <div class="flex flex-col items-center">
                <span class="mb-4 bg-gray-800 text-white px-5 py-1 rounded-full text-[10px] font-black tracking-widest uppercase">橫式宣傳海報 (16:9)</span>
                <div class="canvas-card w-full">
                    <canvas id="canvasL" width="1920" height="1080"></canvas>
                </div>
                <button onclick="download('canvasL')" class="mt-4 text-blue-600 font-bold hover:underline">儲存此海報</button>
            </div>
        </div>
    </div>

    <script>
        // 初始化日期時間
        document.getElementById('eventDate').value = new Date().toISOString().split('T')[0];
        document.getElementById('eventTime').value = "14:00";

        let finalImgObj = null;
        let isRemovingBg = false;

        // 1. 照片去背邏輯與進度監控
        document.getElementById('photoUpload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const progressArea = document.getElementById('progressArea');
            const progressBar = document.getElementById('progressBar');
            const progressPercent = document.getElementById('progressPercent');
            const uploadUI = document.getElementById('uploadUI');

            isRemovingBg = true;
            uploadUI.classList.add('hidden');
            progressArea.classList.remove('hidden');

            try {
                const config = {
                    progress: (fraction) => {
                        const p = Math.round(fraction * 100);
                        progressBar.style.width = p + "%";
                        progressPercent.innerText = `AI 智慧去背中: ${p}%`;
                    }
                };
                
                const blob = await imglyRemoveBackground(file, config);
                const url = URL.createObjectURL(blob);
                
                const img = new Image();
                img.onload = () => {
                    finalImgObj = img;
                    isRemovingBg = false;
                    progressPercent.innerText = "✅ 照片處理完成";
                    progressPercent.className = "text-[10px] text-green-600 mt-2 font-bold";
                };
                img.src = url;

            } catch (err) {
                console.error(err);
                alert("去背引擎加載失敗，改用原始照片。");
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => { finalImgObj = img; isRemovingBg = false; };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
                uploadUI.classList.remove('hidden');
                progressArea.classList.add('hidden');
            }
        });

        // 2. 藝術風格隨機池
        const STYLE_POOL = ["梵谷油畫", "包浩斯幾何", "莫蘭迪灰調", "賽博龐克霓虹", "瑞士國際主義", "日系禪意", "孟菲斯設計"];

        // 3. 串接 Gemini 2.5 並渲染
        document.getElementById('mainBtn').addEventListener('click', async () => {
            const apiKey = document.getElementById('apiKey').value.trim();
            const title = document.getElementById('eventTitle').value.trim();
            const name = document.getElementById('speakerName').value.trim();
            const apiStatusArea = document.getElementById('apiStatusArea');
            const apiStatusText = document.getElementById('apiStatusText');

            if (!apiKey || !title || !name || !finalImgObj) {
                alert("請填寫所有欄位、金鑰並上傳照片");
                return;
            }

            if (isRemovingBg) return alert("請等待照片處理完成");

            // 狀態重置
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btnText');
            loader.classList.remove('hidden');
            btnText.innerText = "正在連線 AI 設計師...";
            apiStatusArea.classList.add('hidden');

            const targetStyle = STYLE_POOL[Math.floor(Math.random() * STYLE_POOL.length)];

            // 設計 Prompt
            const prompt = `你是一位世界級平面設計師。活動「${title}」，講者「${name}」。
            風格指定：「${targetStyle}」。
            請決定配色與視覺細節，僅回傳 JSON，海報內容必須全為繁體中文：
            {
                "bgMain": "背景主色16進位",
                "bgSub": "背景漸層色16進位",
                "textColor": "文字主色16進位",
                "accentColor": "裝飾圖形色16進位",
                "slogan": "一句8字內繁體中文吸引人的標語",
                "fontFamily": "serif 或 sans-serif",
                "decoration": "circle 或 line 或 triangle"
            }
            不要回傳 markdown，只要純 JSON。`;

            try {
                // 串接指定模型 gemini-2.5-flash
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw { status: response.status, message: errData.error.message };
                }

                // 成功連線診斷
                apiStatusArea.className = "p-4 rounded-2xl text-xs font-bold border-l-4 bg-green-50 border-green-500 text-green-700";
                apiStatusText.innerText = `✅ API 連線成功 (模型: gemini-2.5-flash) - 正在生成設計`;
                apiStatusArea.classList.remove('hidden');

                const data = await response.json();
                const rawText = data.candidates[0].content.parts[0].text;
                const design = JSON.parse(rawText.match(/\{[\s\S]*\}/)[0]);

                // 4. 畫布渲染
                draw('canvasP', title, name, design);
                draw('canvasL', title, name, design);

                document.getElementById('resultAr
