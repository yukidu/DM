<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 藝術海報設計師</title>
    <!-- 載入 Tailwind CSS, Google 字體與 去背套件 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@latest/dist/bundle.js"></script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .art-font { font-family: 'Noto Serif TC', serif; }
        canvas { max-width: 100%; height: auto; border-radius: 1.5rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .loading-bar { transition: width 0.3s ease; }
    </style>
</head>
<body class="py-10 px-4">

    <div class="max-w-xl mx-auto bg-white p-8 rounded-[2.5rem] shadow-2xl border border-gray-100">
        <h1 class="text-3xl font-black text-center mb-2 tracking-tighter text-slate-800">AI 藝術海報設計師</h1>
        <p class="text-center text-slate-400 text-sm mb-8">搭載 Gemini 2.0 Flash 視覺美學引擎</p>
        
        <div class="space-y-4">
            <!-- API Key -->
            <div>
                <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase tracking-widest">Gemini API 金鑰</label>
                <input type="password" id="apiKey" class="w-full p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="貼上您的 AI Studio 金鑰...">
            </div>

            <input type="text" id="eventTitle" class="w-full p-4 bg-slate-50 rounded-2xl border-none" placeholder="活動名稱 (例如：未來科技巔峰論壇)">
            <input type="text" id="speakerName" class="w-full p-4 bg-slate-50 rounded-2xl border-none" placeholder="主講人姓名">
            
            <div class="grid grid-cols-2 gap-4">
                <input type="date" id="date" class="p-4 bg-slate-50 rounded-2xl text-sm border-none">
                <input type="time" id="time" class="p-4 bg-slate-50 rounded-2xl text-sm border-none">
            </div>

            <!-- 上傳區域與進度條 -->
            <label for="photoUpload" class="relative block border-2 border-dashed border-slate-200 rounded-2xl p-8 text-center hover:bg-slate-50 transition cursor-pointer">
                <input type="file" id="photoUpload" accept="image/*" class="hidden">
                <div id="uploadUI">
                    <p id="uploadText" class="text-blue-600 font-black">📷 點擊上傳主講人照片</p>
                    <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-widest">AI 將自動進行智慧去背</p>
                </div>
                <!-- 進度條 -->
                <div id="progressWrapper" class="hidden mt-4">
                    <div class="w-full bg-slate-100 rounded-full h-1.5 overflow-hidden">
                        <div id="progressBar" class="loading-bar bg-blue-600 h-full w-0"></div>
                    </div>
                    <p id="progressText" class="text-[10px] text-slate-500 mt-2 font-bold">正在下載 AI 去背模型 (35MB)...</p>
                </div>
            </label>

            <!-- 按鈕組 -->
            <div class="grid grid-cols-1 gap-3 pt-2">
                <button id="generateBtn" class="w-full py-5 bg-blue-600 text-white rounded-2xl font-black text-xl hover:bg-blue-700 shadow-xl shadow-blue-100 transition-all flex justify-center items-center">
                    <span id="btnText">啟動 AI 智能設計</span>
                    <div id="loader" class="hidden ml-3 w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                </button>
                <button id="randomBtn" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold text-sm hover:bg-black transition-all">
                    🎲 隨機切換藝術風格 (大師配色)
                </button>
            </div>
            <p id="aiStatus" class="text-center text-xs font-bold text-slate-400 mt-2 min-h-[1rem]"></p>
        </div>
    </div>

    <!-- 結果顯示區 -->
    <div id="resultArea" class="hidden max-w-6xl mx-auto mt-20 pb-20">
        <div class="grid md:grid-cols-2 gap-16">
            <div class="flex flex-col items-center">
                <span class="mb-4 text-xs font-black text-slate-300 uppercase tracking-widest">Portrait / 直式宣傳版</span>
                <canvas id="pCanvas" width="1080" height="1920" class="w-72"></canvas>
                <button onclick="download('pCanvas')" class="mt-6 text-sm font-bold text-blue-500 hover:underline tracking-widest">下載直式海報</button>
            </div>
            <div class="flex flex-col items-center">
                <span class="mb-4 text-xs font-black text-slate-300 uppercase tracking-widest">Landscape / 橫式廣告版</span>
                <canvas id="lCanvas" width="1920" height="1080" class="w-full max-w-lg"></canvas>
                <button onclick="download('lCanvas')" class="mt-6 text-sm font-bold text-blue-500 hover:underline tracking-widest">下載橫式海報</button>
            </div>
        </div>
    </div>

    <script>
        // 1. 初始化
        document.getElementById('date').value = new Date().toISOString().split('T')[0];
        document.getElementById('time').value = "14:00";

        let finalSpeakerImg = null;
        let isProcessingImg = false;

        // 2. AI 智慧去背邏輯
        document.getElementById('photoUpload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const progressWrapper = document.getElementById('progressWrapper');
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');
            const uploadUI = document.getElementById('uploadUI');

            isProcessingImg = true;
            uploadUI.classList.add('hidden');
            progressWrapper.classList.remove('hidden');
            progressBar.style.width = "10%";

            try {
                // 使用 imgly 去背 (這是在瀏覽器端執行的 AI)
                const config = {
                    progress: (fraction) => {
                        const p = Math.round(fraction * 100);
                        progressBar.style.width = p + "%";
                        progressText.innerText = p < 100 ? `AI 正在掃描邊緣: ${p}%` : "去背完成！正在優化圖層...";
                    }
                };
                
                const blob = await imglyRemoveBackground(file, config);
                const url = URL.createObjectURL(blob);
                
                const img = new Image();
                img.onload = () => {
                    finalSpeakerImg = img;
                    isProcessingImg = false;
                    progressText.innerText = "✅ 照片處理成功，AI 設計師已準備就緒";
                    progressText.classList.add('text-green-600');
                };
                img.src = url;

            } catch (err) {
                console.error("去背出錯:", err);
                alert("去背引擎初始化失敗，將改用原始照片。");
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => { finalSpeakerImg = img; isProcessingImg = false; };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
                uploadUI.classList.remove('hidden');
                progressWrapper.classList.add('hidden');
            }
        });

        // 3. 藝術風格定義
        const ART_VIBES = [
            { name: "梵谷星夜", bgRange: ["#0F2027", "#203A43"], text: "#FFFFFF", accent: "#F9C74F", font: "serif" },
            { name: "包浩斯幾何", bgRange: ["#E0E0E0", "#D0D0D0"], text: "#1A1A1A", accent: "#EA3323", font: "sans-serif" },
            { name: "莫蘭迪高級灰", bgRange: ["#B5A397", "#948B78"], text: "#4A4E69", accent: "#F2E9E4", font: "serif" },
            { name: "賽博龐克", bgRange: ["#000000", "#0B0B0B"], text: "#00F5FF", accent: "#FF007F", font: "sans-serif" },
            { name: "瑞士國際主義", bgRange: ["#FFFFFF", "#F2F2F2"], text: "#000000", accent: "#2563EB", font: "sans-serif" },
            { name: "日系禪意", bgRange: ["#F8F1E7", "#E2D5C3"], text: "#433D3C", accent: "#BC6C25", font: "serif" }
        ];

        // 4. 串接 Gemini 2.0 執行 AI 設計
        document.getElementById('generateBtn').addEventListener('click', () => startDesign(false));
        document.getElementById('randomBtn').addEventListener('click', () => startDesign(true));

        async function startDesign(isRandom) {
            const key = document.getElementById('apiKey').value.trim();
            const title = document.getElementById('eventTitle').value.trim();
            const name = document.getElementById('speakerName').value.trim();

            if (!key) return alert("請輸入有效的 Gemini API 金鑰");
            if (!title || !name || !finalSpeakerImg) return alert("請完整填寫資料並上傳照片");
            if (isProcessingImg) return alert("AI 正在處理照片，請稍候...");

            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const aiStatus = document.getElementById('aiStatus');

            btnText.innerText = "AI 設計師構思中...";
            loader.classList.remove('hidden');

            const selectedVibe = isRandom ? ART_VIBES[Math.floor(Math.random() * ART_VIBES.length)] : null;
            
            // 建立 Prompt
            const prompt = `你是一位資深海報設計師。請為活動「${title}」設計視覺方案。
            講者是「${name}」。
            ${selectedVibe ? `風格必須參考：「${selectedVibe.name}」。` : `請根據活動標題自動決定最適合的配色美學。`}
            請嚴格遵守以下 JSON 格式回傳，且海報內容必須全為繁體中文：
            {
                "bgMain": "背景主色16進位",
                "bgSub": "背景輔助色16進位",
                "textColor": "文字主色16進位",
                "accentColor": "裝飾元素色16進位",
                "slogan": "一句8字內繁體中文標語",
                "fontStyle": "serif 或 sans-serif",
                "layoutType": "split 或 center"
            }
            不要回傳任何英文解釋，只要 JSON。`;

            try {
                // 調用 Gemini 2.0 Flash 模型
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                const rawText = data.candidates[0].content.parts[0].text;
                const jsonMatch = rawText.match(/\{[\s\S]*\}/);
                const design = JSON.parse(jsonMatch[0]);

                aiStatus.innerText = `✨ 已套用 AI 視覺方案：${design.slogan}`;

                // 開始畫布渲染
                renderPoster('pCanvas', title, name, design);
                renderPoster('lCanvas', title, name, design);

                document.getElementById('resultArea').classList.remove('hidden');
                window.scrollTo({ top: document.getElementById('resultArea').offsetTop - 50, behavior: 'smooth' });

            } catch (err) {
                console.error("AI 調用出錯:", err);
                alert("AI 伺服器回應錯誤，請確認 API 金鑰是否正確。");
            } finally {
                btnText.innerText = "啟動 AI 智能設計";
                loader.classList.add('hidden');
            }
        }

        // 5. 海報渲染引擎 (Canvas)
        function renderPoster(id, title, name, design) {
            const canvas = document.getElementById(id);
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;
            const isPortrait = h > w;

            // A. 漸層背景
            const grad = ctx.createLinearGradient(0, 0, w, h);
            grad.addColorStop(0, design.bgMain);
            grad.addColorStop(1, design.bgSub);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            // B. 藝術幾何裝飾
            ctx.globalAlpha = 0.3;
            ctx.fillStyle = design.accentColor;
            ctx.beginPath();
            ctx.arc(w * 0.8, h * 0.2, w * 0.6, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.globalAlpha = 0.1;
            for(let i=0; i<5; i++) {
                ctx.fillRect(Math.random()*w, Math.random()*h, w*0.4, 10);
            }
            ctx.globalAlpha = 1.0;

            // C. 繪製去背主講人
            if (finalSpeakerImg) {
                const ratio = isPortrait ? (w * 0.95) / finalSpeakerImg.width : (h * 0.95) / finalSpeakerImg.height;
                const dw = finalSpeakerImg.width * ratio;
                const dh = finalSpeakerImg.height * ratio;
                const dx = isPortrait ? (w - dw) / 2 : w - dw;
                const dy = h - dh;
                ctx.drawImage(finalSpeakerImg, dx, dy, dw, dh);
            }

            // D. 文字渲染 (繁體中文)
            ctx.fillStyle = design.textColor;
            ctx.textAlign = isPortrait ? "center" : "left";
            const x = isPortrait ? w / 2 : w * 0.08;
            const fontBase = design.fontStyle === "serif" ? "Noto Serif TC" : "Noto Sans TC";

            // 標題 (大標)
            ctx.font = `900 ${w * 0.09}px "${fontBase}"`;
            ctx.fillText(title, x, h * 0.16);

            // 標語 (AI 生成)
            ctx.fillStyle = design.accentColor;
            ctx.font = `700 ${w * 0.045}px "Noto Sans TC"`;
            ctx.fillText(design.slogan, x, h * 0.23);

            // 姓名
            ctx.fillStyle = design.textColor;
            ctx.font = `900 ${w * 0.07}px "${fontBase}"`;
            ctx.fillText(`主講｜${name}`, x, h * 0.33);

            // 時間與日期
            const dateStr = document.getElementById('date').value.replace(/-/g, '.');
            const timeStr = document.getElementById('time').value;
            ctx.font = `700 ${w * 0.035}px "Noto Sans TC"`;
            ctx.fillText(`${dateStr} AT ${timeStr}`, x, h * 0.40);

            // E. 設計邊框裝飾
            ctx.strokeStyle = design.accentColor;
            ctx.lineWidth = 20;
            ctx.strokeRect(40, 40, w - 80, h - 80);
        }

        // 下載功能
        function download(id) {
            const link = document.createElement('a');
            link.download = `AI-Poster-${id}-${Date.now()}.png`;
            link.href = document.getElementById(id).toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
