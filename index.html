<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皇冠大使對焦系統 | 贏在開發</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .gold-border { border: 2px solid #d4af37; }
        .bg-royal { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .btn-gold { background: linear-gradient(to right, #d4af37, #f97316); color: white; transition: 0.3s; }
        .btn-gold:hover { transform: scale(1.02); box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }
        .card { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        input, select { background: #334155 !important; border: 1px solid #475569 !important; color: white !important; }
        .loading { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-600 mb-4">
                👑 皇冠大使對焦系統
            </h1>
            <p class="text-gray-400 text-lg tracking-widest">「領袖的深度，決定團隊的高度。」</p>
        </header>

        <!-- API Key Login Bar (模擬登入感) -->
        <div class="card p-4 rounded-xl mb-8 flex flex-col md:flex-row items-center gap-4">
            <div class="flex-1 w-full">
                <input type="password" id="apiKey" class="w-full p-2 rounded-lg text-sm" placeholder="請貼上您的 Google Gemini API Key (僅需輸入一次)">
            </div>
            <button onclick="saveKey()" class="w-full md:w-auto px-6 py-2 bg-blue-600 rounded-lg text-sm font-bold hover:bg-blue-500 transition">
                記憶權限
            </button>
            <span id="keyStatus" class="text-xs text-green-400"></span>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Left Side: Prospect Info -->
            <section class="card p-6 rounded-2xl shadow-2xl">
                <h2 class="text-xl font-bold mb-6 text-yellow-500 flex items-center">
                    <span class="mr-2">📋</span> 對象基本資料
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">姓名</label>
                        <input type="text" id="name" class="w-full p-3 rounded-lg" placeholder="例如：林大衛">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">年齡</label>
                            <input type="text" id="age" class="w-full p-3 rounded-lg" placeholder="35">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">職業</label>
                            <input type="text" id="job" class="w-full p-3 rounded-lg" placeholder="業務經理">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">是否已破題安麗？</label>
                        <select id="isRevealed" class="w-full p-3 rounded-lg">
                            <option value="尚未破題">尚未破題 (保持神祕感)</option>
                            <option value="已知道，不排斥">已知道，觀感中立</option>
                            <option value="已知道，有負面印象">已知道，有排斥感</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">是否參加過活動？</label>
                        <select id="hasAttended" class="w-full p-3 rounded-lg">
                            <option value="從未參加">從未參加</option>
                            <option value="參加過小型聚會">參加過小型聚會 (Home Party)</option>
                            <option value="參加過大型大會">參加過大型年會/表揚大會</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">是否見過上手領導人？</label>
                        <select id="metUpline" class="w-full p-3 rounded-lg">
                            <option value="否">否 (尚未推崇領導人)</option>
                            <option value="是">是 (已建立初步信任)</option>
                        </select>
                    </div>
                    <div class="pt-4 border-t border-gray-700">
                        <label class="block text-xs text-yellow-600 font-bold mb-1">我希望邀約的活動</label>
                        <input type="text" id="targetEvent" class="w-full p-3 rounded-lg border-yellow-900" placeholder="例如：週三健康講座、OPP">
                    </div>
                    <div>
                        <label class="block text-xs text-yellow-600 font-bold mb-1">我希望推薦的產品</label>
                        <input type="text" id="targetProduct" class="w-full p-3 rounded-lg" placeholder="例如：紐崔萊雙倍潔、淨水器">
                    </div>
                </div>

                <button onclick="askMaster()" id="mainBtn" class="w-full mt-8 py-4 btn-gold rounded-xl font-bold text-lg shadow-lg">
                    立即生成大師級邀約稿
                </button>
            </section>

            <!-- Right Side: AI Master Output -->
            <section class="flex flex-col">
                <div id="loading" class="hidden text-center py-20 card rounded-2xl">
                    <div class="loading text-4xl mb-4">💎</div>
                    <p class="text-yellow-500 animate-pulse">正在為您運用數億兆級別的商業邏輯進行對焦...</p>
                </div>

                <div id="result" class="hidden card p-8 rounded-2xl flex-1 overflow-y-auto max-h-[700px] border-l-4 border-yellow-500">
                    <h3 class="text-2xl font-bold mb-6 text-white border-b border-gray-700 pb-2">皇冠大使的實戰策略</h3>
                    <div id="outputContent" class="space-y-6 text-gray-300 leading-relaxed">
                        <!-- Content will be injected here -->
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        // 頁面加載時檢查是否有存過的 Key
        window.onload = () => {
            const savedKey = localStorage.getItem('amway_gemini_key');
            if (savedKey) {
                document.getElementById('apiKey').value = savedKey;
                document.getElementById('keyStatus').innerText = "✅ 權限已自動載入";
            }
        };

        function saveKey() {
            const key = document.getElementById('apiKey').value;
            if (key) {
                localStorage.setItem('amway_gemini_key', key);
                alert("金鑰已記憶在瀏覽器，下次開啟無需再輸入！");
                document.getElementById('keyStatus').innerText = "✅ 權限已自動載入";
            }
        }

        async function askMaster() {
            const key = document.getElementById('apiKey').value;
            if (!key) { return alert("請輸入 API Key！這就像是創業的門票。"); }

            const btn = document.getElementById('mainBtn');
            const resultDiv = document.getElementById('result');
            const loadingDiv = document.getElementById('loading');
            const output = document.getElementById('outputContent');

            btn.disabled = true;
            loadingDiv.classList.remove('hidden');
            resultDiv.classList.add('hidden');

            const data = {
                name: document.getElementById('name').value || '朋友',
                age: document.getElementById('age').value || '適婚適育年齡',
                job: document.getElementById('job').value || '上班族',
                isRevealed: document.getElementById('isRevealed').value,
                hasAttended: document.getElementById('hasAttended').value,
                metUpline: document.getElementById('metUpline').value,
                targetEvent: document.getElementById('targetEvent').value || '創業商機分享會',
                targetProduct: document.getElementById('targetProduct').value || '紐崔萊基礎營養組合'
            };

            const prompt = `你現在是一位安麗直銷領域的頂尖皇冠大使，曾率領數萬人致富，資產雄厚。請針對以下個案，給出專業對焦建議：
對象資料：姓名 ${data.name}、年齡 ${data.age}、職業 ${data.job}、破題現況 ${data.isRevealed}、參加過活動 ${data.hasAttended}、見過領導人 ${data.metUpline}。
目標：邀約參加「${data.targetEvent}」並推薦「${data.targetProduct}」。

請提供：
1. **策略心法**：分析此人的缺口（痛點）。
2. **啟發夢想話術**：如何跟他聊未來的可能性（給夢想）。
3. **邀約對話逐字稿**：包含「主動邀約」與「對方猶豫時的回覆」。
4. **產品零售建議**：如何結合他的健康/生活需求專業地帶入 ${data.targetProduct}。
5. **後續跟進建議**：會議結束後的一句話。
口吻要熱情、專業、高格局、且充滿說服力（台灣繁體中文）。`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const json = await response.json();
                const text = json.candidates[0].content.parts[0].text;

                output.innerHTML = formatText(text);
                loadingDiv.classList.add('hidden');
                resultDiv.classList.remove('hidden');
            } catch (e) {
                alert("發生錯誤：請檢查 Key 是否正確或網路狀態。");
            } finally {
                btn.disabled = false;
            }
        }

        function formatText(t) {
            return t.replace(/\n/g, '<br>')
                    .replace(/\*\*(.*?)\*\*/g, '<b class="text-yellow-400">$1</b>')
                    .replace(/### (.*?)/g, '<h4 class="text-xl font-bold text-white mt-4">$1</h4>');
        }
    </script>
</body>
</html>
