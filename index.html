<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皇冠大使 AI 對焦室 | 杜杜龍設計</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background: radial-gradient(circle at top, #1e293b 0%, #020617 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }
        .gold-text { background: linear-gradient(to right, #fde047, #ca8a04); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .input-focus:focus { border-color: #eab308; ring: 2px; ring-color: #eab308; outline: none; }
        .btn-crown { 
            background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
            box-shadow: 0 10px 15px -3px rgba(217, 119, 6, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-crown:hover { transform: translateY(-2px); box-shadow: 0 20px 25px -5px rgba(217, 119, 6, 0.4); }
        .typing-effect { overflow: hidden; border-right: .15em solid orange; white-space: nowrap; animation: typing 3.5s steps(40, end), blink-caret .75s step-end infinite; }
        #output b { color: #facc15; font-weight: 700; }
        #output h3 { font-size: 1.5rem; color: #fde047; margin-top: 1.5rem; margin-bottom: 1rem; border-left: 4px solid #fde047; padding-left: 1rem; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <!-- Header Section -->
        <header class="text-center mb-12">
            <div class="inline-block px-4 py-1 mb-4 border border-yellow-500/50 rounded-full text-yellow-500 text-xs tracking-widest uppercase">
                Enterprise Level AI Decision System
            </div>
            <h1 class="text-5xl md:text-6xl font-black mb-6 gold-text">皇冠大使對焦室（杜杜龍設計）</h1>
            <p class="text-gray-400 text-lg max-w-2xl mx-auto">
                「我們不只是在分享產品，我們是在邀請人們進入一個更高維度的生活方式。」
            </p>
        </header>

        <!-- API Entry (Encrypted Feel) -->
        <div class="glass-card p-6 mb-10 flex flex-col md:flex-row items-center justify-between gap-4 border-yellow-500/20 shadow-[0_0_50px_rgba(234,179,8,0.05)]">
            <div class="flex-1 w-full">
                <label class="text-[10px] uppercase tracking-tighter text-yellow-500/70 mb-1 block">在此輸入密碼，找杜杜龍索取</label>
                <input type="password" id="apiKey" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm input-focus" placeholder="請輸入 API Key...">
            </div>
            <button onclick="saveKey()" class="w-full md:w-auto px-8 py-3 bg-slate-800 border border-slate-600 rounded-lg text-sm font-bold hover:bg-slate-700 transition">
                驗證身分
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <!-- Left: Case Profile -->
            <div class="lg:col-span-5 space-y-6">
                <div class="glass-card p-8">
                    <h2 class="text-xl font-bold mb-6 flex items-center">
                        <span class="w-2 h-8 bg-yellow-500 mr-3 rounded-full"></span>
                        潛在名單對焦
                    </h2>
                    
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-xs text-gray-500 ml-1">姓名</label>
                                <input type="text" id="name" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 mt-1 input-focus" placeholder="林先生">
                            </div>
                            <div>
                                <label class="text-xs text-gray-500 ml-1">年齡</label>
                                <input type="text" id="age" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 mt-1 input-focus" placeholder="25-45">
                            </div>
                        </div>

                        <div>
                            <label class="text-xs text-gray-500 ml-1">職業現狀</label>
                            <input type="text" id="job" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 mt-1 input-focus" placeholder="例如：傳產經理、全職媽媽">
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="text-xs text-gray-500 ml-1">已破題安麗？</label>
                                <select id="isRevealed" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 mt-1 input-focus">
                                    <option value="否">尚未破題</option>
                                    <option value="是，但不深">已破題，但未深入</option>
                                    <option value="是，有抗拒">已破題，有抗拒感</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-xs text-gray-500 ml-1">見過上手領導人？</label>
                                <select id="metUpline" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 mt-1 input-focus">
                                    <option value="否">尚未引薦</option>
                                    <option value="是">已經引薦</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="text-xs text-gray-500 ml-1">邀約目標活動</label>
                            <input type="text" id="targetEvent" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 mt-1 input-focus text-yellow-400 font-bold" placeholder="例如：招商大會講座、OPP、基礎營養講座、美容護膚">
                        </div>

                        <div>
                            <label class="text-xs text-gray-500 ml-1">推薦目標產品</label>
                            <input type="text" id="targetProduct" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 mt-1 input-focus text-blue-400 font-bold" placeholder="例如：營養早餐、淨水器">
                        </div>
                    </div>

                    <button onclick="consultMaster()" id="actionBtn" class="w-full mt-10 py-4 btn-crown rounded-xl font-black text-white tracking-widest uppercase">
                        開始導師對焦
                    </button>
                </div>
            </div>

            <!-- Right: Crown Ambassador Output -->
            <div class="lg:col-span-7">
                <div id="placeholder" class="glass-card h-full flex flex-col items-center justify-center p-12 text-center">
                    <div class="text-6xl mb-6 opacity-20">💼</div>
                    <p class="text-gray-500 italic">「成功不是偶然，而是精準的佈局。<br>填寫左側資料，讓我為您的事業指點迷津。」</p>
                </div>

                <div id="loading" class="hidden glass-card h-full flex flex-col items-center justify-center p-12">
                    <div class="inline-block w-12 h-12 border-4 border-yellow-500/30 border-t-yellow-500 rounded-full animate-spin mb-6"></div>
                    <p class="text-yellow-500 font-bold animate-pulse">正在調研全球萬人團隊數據，生成最佳話術...</p>
                </div>

                <div id="result" class="hidden glass-card p-10 h-full overflow-y-auto max-h-[800px] border-l-4 border-yellow-500">
                    <div class="flex items-center justify-between mb-8 border-b border-white/10 pb-4">
                        <div class="flex items-center">
                            <div class="w-10 h-10 bg-yellow-500 rounded-full flex items-center justify-center text-black font-black mr-3">👑</div>
                            <span class="text-xl font-bold">大師策略建議稿</span>
                        </div>
                        <span class="text-[10px] text-gray-500">Engine: Gemini 2.0 Flash</span>
                    </div>
                    <div id="output" class="text-gray-300 leading-relaxed text-lg"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 儲存 API Key 到瀏覽器紀錄
        window.onload = () => {
            const saved = localStorage.getItem('amway_leader_key');
            if (saved) {
                document.getElementById('apiKey').value = saved;
            }
        };

        function saveKey() {
            const key = document.getElementById('apiKey').value;
            localStorage.setItem('amway_leader_key', key);
            alert("✅ 權限已獲取，皇冠大使隨時待命。");
        }

        async function consultMaster() {
            const key = document.getElementById('apiKey').value;
            if (!key) return alert("請輸入引擎密鑰 (API Key)！");

            const btn = document.getElementById('actionBtn');
            const placeholder = document.getElementById('placeholder');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const output = document.getElementById('output');

            btn.disabled = true;
            placeholder.classList.add('hidden');
            result.classList.add('hidden');
            loading.classList.remove('hidden');

            const data = {
                name: document.getElementById('name').value || '朋友',
                age: document.getElementById('age').value || '不詳',
                job: document.getElementById('job').value || '一般職業',
                isRevealed: document.getElementById('isRevealed').value,
                metUpline: document.getElementById('metUpline').value,
                targetEvent: document.getElementById('targetEvent').value || '線下分享會',
                targetProduct: document.getElementById('targetProduct').value || '紐崔萊基礎營養'
            };

            const prompt = `你是一位在安麗事業極度成功的皇冠大使，帶領萬人團隊，資產數億兆。不要讓對方感到勉強或不舒服，台詞文字不要誇張，文字要符合「接地氣、平易近人、口語化、溫暖」，產生的文字要適合用電話說、精簡扼要30秒內能說完」，讓用戶聽完後產生好奇心、提高意願！

請針對以下對象，給出一段「一問一答」的對焦建議：
對象姓名：${data.name}
背景：${data.age}歲，從事${data.job}
現狀：安麗破題(${data.isRevealed})、見過領導人(${data.metUpline})
目標活動：${data.targetEvent}
目標推薦產品：${data.targetProduct}

請按以下邏輯撰寫：
3. **邀約活動話術**：如何自然地帶到「${data.targetEvent}」。
4. **模擬情境處理 (抗拒處理)**：
   - 如果他問「是不是直銷/安麗？」你要如何回覆。
   - 如果他問「我沒時間」你要如何回覆。
   `;

            try {
             // 使用 Gemini 3.1 Flash Lite 節點
const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${key}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
});

                const json = await response.json();
                if (json.error) throw new Error(json.error.message);
                
                const text = json.candidates[0].content.parts[0].text;

                output.innerHTML = formatAIResponse(text);
                loading.classList.add('hidden');
                result.classList.remove('hidden');

            } catch (err) {
                alert("連線失敗：" + err.message);
                loading.classList.add('hidden');
                placeholder.classList.remove('hidden');
            } finally {
                btn.disabled = false;
            }
        }

        function formatAIResponse(text) {
            return text
                .replace(/\n/g, '<br>')
                .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                .replace(/### (.*?)/g, '<h3>$1</h3>')
                .replace(/# (.*?)/g, '<h2 class="text-2xl font-black text-yellow-500">$1</h2>');
        }
    </script>
</body>
</html>
